<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="toggleSwitch.css">
    <title>Amazon Smart Sort</title>
</head>

<body>
    <div class="header">
        <img class="logo" src="images/das48.png" alt="DAS Logo">
        <div class="title" id="appName" data-i18n="appName"></div>
    </div>

    <div class="section">
        <div class="label-group">
            <label class="label-title" id="changeSortLabel" data-i18n="changeSortLabel"></label>
        </div>
        <select id="changeSort">
            <option id="featured" value="featured" data-i18n="featured"></option>
            <option id="bestSellers" value="bestSellers" data-i18n="bestSellers"></option>
            <option id="lowToHigh" value="lowToHigh" data-i18n="lowToHigh"></option>
            <option id="highToLow" value="highToLow" data-i18n="highToLow"></option>
            <option id="customerReview" value="customerReview" data-i18n="customerReview"></option>
            <option id="newestArrivals" value="newestArrivals" data-i18n="newestArrivals"></option>
        </select>

    </div>

    <div class="section">
        <div class="toggle-container">
            <span class="toggle-text" id="primeOnlyLabel" data-i18n="primeOnlyLabel">Prime Only</span>
            <label class="switch">
                <input type="checkbox" id="primeOnly">
                <span class="slider"></span>
            </label>
        </div>
        <div class="toggle-divider"></div>
        <div class="toggle-container">
            <span class="toggle-text" id="switchLabel" data-i18n="switchLabel"></span>
            <label class="switch">
                <input type="checkbox" id="extensionEnabled">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="footer">
        <span id="versionLabel" data-i18n="versionLabel">v4.0.0</span>
        <br><br>
        <a href="mailto:harshankur@outlook.com?subject=Default%20Amazon%20Sort&colon;%20Missing%20region%20for%20Prime%20Only"
            style="color: var(--accent-cyan); text-decoration: none;" id="feedbackLink" data-i18n="feedbackLink">Report
            Missing Region</a>
    </div>

    <script src="popup.js"></script>
</body>



</html>
